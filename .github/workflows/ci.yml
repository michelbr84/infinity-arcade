name: CI — GenreForge Arcade

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Xvfb
        run: sudo apt-get install -y xvfb

      - name: Create venv and install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt
          .venv/bin/pip install -e ".[dev]"

      - name: Run structural tests
        run: |
          .venv/bin/pytest tests/test_skill_smoke.py -v

      - name: Smoke test — generate game
        run: |
          .venv/bin/python .claude/skills/pygame-genre-forge/scripts/generate_game.py \
            --genre shooter --name "ci-test-shooter" --pitch "CI smoke test"

      - name: Smoke test — validate game (headless)
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: |
          xvfb-run .venv/bin/python .claude/skills/pygame-genre-forge/scripts/validate_game.py \
            generated_games/ci-test-shooter/ --timeout 5 || true

      - name: Upload validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-artifacts
          path: generated_games/*/\_artifacts/
          if-no-files-found: ignore
